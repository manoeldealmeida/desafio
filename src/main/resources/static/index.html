<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de URL Rocha</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        input[type="text"] { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 95%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; font-weight: bold; word-break: break-all; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Encurtador de URL 🚀</h2>
    <input type="text" id="urlInput" placeholder="Cole sua URL longa aqui (https://...)">
    <button onclick="encurtarUrl()">Encurtar Link</button>
    <div class="result" id="resultDiv"></div>
</div>

<script>
    async function encurtarUrl() {
        const urlInput = document.getElementById('urlInput').value;
        const resultDiv = document.getElementById('resultDiv');
        resultDiv.innerText = "Processando...";

        try {
            const response = await fetch('/api/v1/url/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || "Erro ao encurtar URL.");
            }

            const data = await response.json();

            // Remove o prefixo da API apenas para o texto visível na tela
            const linkVisivel = data.shortUrl.replace("http://localhost:8080/api/v1/", "");

            // O href continua com a URL completa para funcionar, mas o texto da tela fica curto
            resultDiv.innerHTML = `Link curto gerado:<br><a href="${data.shortUrl}" target="_blank">${linkVisivel}</a>`;
        } catch (error) {
            resultDiv.innerHTML = `<span style="color:red;">${error.message}</span>`;
        }
    }
</script>
</body>
</html>
